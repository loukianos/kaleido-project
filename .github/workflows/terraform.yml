name: terraform

on:
  pull_request:
    paths:
      - .github/workflows/terraform.yml
      - deploy/terraform/**
  push:
    branches: [main]
    paths:
      - .github/workflows/terraform.yml
      - deploy/terraform/**
  workflow_dispatch:
    inputs:
      apply:
        description: Apply the Terraform changes instead of plan-only.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: terraform-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'kaleido' }}
  KUBERNETES_VERSION: ${{ vars.KUBERNETES_VERSION || '1.31' }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=deploy/terraform init -input=false

      - name: Terraform validate
        run: terraform -chdir=deploy/terraform validate

      - name: Terraform plan
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.apply) }}
        run: terraform -chdir=deploy/terraform plan -input=false -var="aws_profile=" -var="kubernetes_version=${KUBERNETES_VERSION}"

      - name: Terraform apply
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply) }}
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(aws eks describe-cluster \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}" \
            --query 'cluster.version' \
            --output text 2>/dev/null || true)"

          if [ -z "${current_version}" ] || [ "${current_version}" = "None" ]; then
            terraform -chdir=deploy/terraform apply -input=false -auto-approve \
              -var="aws_profile=" \
              -var="kubernetes_version=${KUBERNETES_VERSION}"
            exit 0
          fi

          current_major="${current_version%%.*}"
          current_minor="${current_version#*.}"
          target_major="${KUBERNETES_VERSION%%.*}"
          target_minor="${KUBERNETES_VERSION#*.}"

          if [ "${current_major}" != "${target_major}" ]; then
            echo "::error::Refusing cross-major Kubernetes upgrade from ${current_version} to ${KUBERNETES_VERSION}"
            exit 1
          fi

          if [ "${current_minor}" -gt "${target_minor}" ]; then
            echo "::error::Cluster ${EKS_CLUSTER_NAME} is already ahead of configured target ${KUBERNETES_VERSION}"
            exit 1
          fi

          if [ "${current_minor}" -eq "${target_minor}" ]; then
            terraform -chdir=deploy/terraform apply -input=false -auto-approve \
              -var="aws_profile=" \
              -var="kubernetes_version=${KUBERNETES_VERSION}"
            exit 0
          fi

          for minor in $(seq "$((current_minor + 1))" "${target_minor}"); do
            version="${target_major}.${minor}"
            echo "Applying Terraform with kubernetes_version=${version}"
            terraform -chdir=deploy/terraform apply -input=false -auto-approve \
              -var="aws_profile=" \
              -var="kubernetes_version=${version}"
          done
