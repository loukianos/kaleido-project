definitions:
  api.contractResponse:
    properties:
      active:
        type: boolean
      address:
        type: string
      base_uri:
        type: string
      chain_id:
        type: integer
      deploy_tx_hash:
        type: string
      id:
        type: integer
    type: object
  api.contractsListResponse:
    properties:
      contracts:
        items:
          $ref: '#/definitions/api.contractResponse'
        type: array
    type: object
  api.createLoanRequest:
    properties:
      apr_bps:
        type: integer
      borrower_ref:
        type: string
      contract_id:
        description: ContractID selects the loan series to originate into; omit it
          to use the chain's active contract.
        type: integer
      lender_address:
        description: Exactly one of lender_address (external wallet) and lender_subject
          (custodial identity) is required.
        type: string
      lender_subject:
        type: string
      principal_minor:
        type: integer
      term_days:
        type: integer
    type: object
  api.createRepaymentRequest:
    properties:
      amount_minor:
        type: integer
      external_ref:
        type: string
    type: object
  api.deployContractRequest:
    properties:
      activate:
        description: |-
          Activate makes the new contract the default for new originations, replacing the current default.
          The chain's first contract always becomes the default regardless of this flag.
        type: boolean
      base_uri:
        type: string
    type: object
  api.errorResponse:
    properties:
      error:
        type: string
    type: object
  api.healthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  api.loanResponse:
    properties:
      apr_bps:
        type: integer
      borrower_ref:
        type: string
      contract_id:
        type: integer
      id:
        type: integer
      interest_due_minor:
        type: integer
      lender_address:
        type: string
      lender_subject:
        type: string
      operation_id:
        type: integer
      outstanding_minor:
        type: integer
      owner_address:
        type: string
      principal_minor:
        type: integer
      status:
        type: string
      term_days:
        type: integer
      token_id:
        type: string
      total_due_minor:
        type: integer
      tx_hash:
        type: string
    type: object
  api.loansListResponse:
    properties:
      loans:
        items:
          $ref: '#/definitions/api.loanResponse'
        type: array
    type: object
  api.readinessResponse:
    properties:
      active_contract:
        type: string
      checks:
        additionalProperties:
          type: string
        type: object
      started_at:
        example: "2026-01-02T15:04:05Z"
        type: string
      status:
        example: ready
        type: string
    type: object
  api.repaymentResponse:
    properties:
      amount_minor:
        type: integer
      created_at:
        type: string
      external_ref:
        type: string
      id:
        type: integer
      loan_id:
        type: integer
    type: object
  api.repaymentResultResponse:
    properties:
      loan:
        $ref: '#/definitions/api.loanResponse'
      repayment:
        $ref: '#/definitions/api.repaymentResponse'
      settlement_operation_id:
        type: integer
      settlement_tx_hash:
        type: string
    type: object
  api.repaymentsListResponse:
    properties:
      repayments:
        items:
          $ref: '#/definitions/api.repaymentResponse'
        type: array
    type: object
  api.serviceInfoResponse:
    properties:
      service:
        type: string
      signer_address:
        example: 0x627306090abaB3A6e1400e9345bC60c78a8BEf57
        type: string
      version:
        type: string
    type: object
  api.termsResponse:
    properties:
      apr_bps:
        type: integer
      interest_due_minor:
        type: integer
      principal_minor:
        type: integer
      term_days:
        type: integer
      total_due_minor:
        type: integer
    type: object
  api.transferLoanRequest:
    properties:
      to_address:
        description: Exactly one of to_address (external wallet) and to_subject (custodial
          identity) is required.
        type: string
      to_subject:
        type: string
    type: object
info:
  contact: {}
  description: API for managing ERC-721-backed loan notes
  title: Loan Note API
  version: 0.1.0
paths:
  /:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.serviceInfoResponse'
      summary: Service metadata
      tags:
      - system
  /admin/contracts/{id}/activate:
    post:
      description: Makes the contract the default for new originations, replacing
        the current default.
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.contractResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Activate contract
      tags:
      - contracts
  /admin/contracts/deploy:
    post:
      consumes:
      - application/json
      description: Deploys a new LoanNote contract instance; each instance is its
        own loan series. The chain's first contract becomes the origination default;
        later deploys only take over the default when activate is true.
      parameters:
      - description: Optional base URI override and activation flag. Empty body uses
          the configured default base URI
        in: body
        name: request
        schema:
          $ref: '#/definitions/api.deployContractRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.contractResponse'
        "400":
          description: Invalid JSON body
          schema:
            $ref: '#/definitions/api.errorResponse'
        "503":
          description: Another chain operation is in progress, retry shortly
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Deploy a LoanNote contract
      tags:
      - contracts
  /contracts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.contractsListResponse'
      summary: List contracts
      tags:
      - contracts
  /contracts/{id}:
    get:
      parameters:
      - description: Contract ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.contractResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Get contract
      tags:
      - contracts
  /contracts/active:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.contractResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Active contract
      tags:
      - contracts
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.healthResponse'
      summary: Liveness probe
      tags:
      - system
  /loans:
    get:
      parameters:
      - description: Filter by lender address (case-insensitive)
        in: query
        name: lender
        type: string
      - description: Filter by loan status
        enum:
        - originating
        - active
        - settling
        - repaid
        - defaulted
        in: query
        name: status
        type: string
      - default: 50
        description: Page size
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Result offset
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.loansListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: List loans
      tags:
      - loans
    post:
      consumes:
      - application/json
      parameters:
      - description: Loan to originate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.createLoanRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.loanResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "409":
          description: No active contract deployed
          schema:
            $ref: '#/definitions/api.errorResponse'
        "503":
          description: Another chain operation is in progress, retry shortly
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Originate a loan note
      tags:
      - loans
  /loans/{id}:
    get:
      parameters:
      - description: Loan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.loanResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Get loan
      tags:
      - loans
  /loans/{id}/default:
    post:
      parameters:
      - description: Loan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.loanResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
        "409":
          description: Loan is not active
          schema:
            $ref: '#/definitions/api.errorResponse'
        "503":
          description: Another chain operation is in progress, retry shortly
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Mark loan defaulted
      tags:
      - loans
  /loans/{id}/repayments:
    get:
      parameters:
      - description: Loan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.repaymentsListResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: List repayments
      tags:
      - loans
    post:
      consumes:
      - application/json
      parameters:
      - description: Loan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Repayment to record
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.createRepaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.repaymentResultResponse'
        "400":
          description: Invalid amount or overpayment
          schema:
            $ref: '#/definitions/api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
        "409":
          description: Loan not active or duplicate external_ref
          schema:
            $ref: '#/definitions/api.errorResponse'
        "503":
          description: Another chain operation is in progress, retry shortly
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Record repayment
      tags:
      - loans
  /loans/{id}/terms:
    get:
      parameters:
      - description: Loan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.termsResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Loan terms for tokenURI
      tags:
      - loans
  /loans/{id}/transfer:
    post:
      consumes:
      - application/json
      parameters:
      - description: Loan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Transfer target
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.transferLoanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.loanResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
        "409":
          description: Loan is not transferable
          schema:
            $ref: '#/definitions/api.errorResponse'
        "503":
          description: Another chain operation is in progress, retry shortly
          schema:
            $ref: '#/definitions/api.errorResponse'
      summary: Transfer loan note
      tags:
      - loans
  /ready:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.readinessResponse'
        "503":
          description: One or more readiness checks failed
          schema:
            $ref: '#/definitions/api.readinessResponse'
      summary: Readiness probe
      tags:
      - system
swagger: "2.0"
