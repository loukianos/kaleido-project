# Values marked (tf) come from terraform outputs; the Makefile cloud-deploy target wires them.
image:
  repository: ""   # (tf) ECR repository URL
  tag: latest

# (tf) Postgres connection string, delivered as a Secret.
databaseUrl: ""

# (tf) IAM role the API service account assumes for KMS access.
irsaRoleArn: ""

# (tf) KMS key sealing custodial signing keys.
kmsKeyId: ""
keyEncryptor: aws-kms

awsRegion: us-east-1

# In-cluster Besu JSON-RPC endpoint from the Paladin install.
ethRpcUrl: http://besu-node1.paladin.svc.cluster.local:8545
chainId: "1337"

# Private key for the platform admin/signer, delivered as a Secret.
deployerPrivateKey: ""

# Set after the LoadBalancers exist (phase two of cloud-deploy): tokens carry the public Keycloak issuer, and loan metadata URIs point at the public API.
oidcIssuerUrl: "http://keycloak.pending/realms/loan-notes"
loanBaseUri: "http://api.pending/loans/"
oidcAudience: loan-notes-api

servicerKeyPoolSize: "2"
reconcileIntervalSeconds: "5"

keycloak:
  image: quay.io/keycloak/keycloak:26.4
  adminPassword: ""
  # Realm export JSON; CI passes it from GitHub Secrets, and local deploys can pass an ignored file.
  realmJson: ""
