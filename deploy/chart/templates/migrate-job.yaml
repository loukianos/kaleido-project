apiVersion: batch/v1
kind: Job
metadata:
  name: kaleido-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["migrate"]
          envFrom:
            - configMapRef:
                name: kaleido-api
                optional: true
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kaleido-migrate-db
                  key: DATABASE_URL
---
# The hook job runs before the release's own Secret exists, so it carries its own copy of the connection string.
apiVersion: v1
kind: Secret
metadata:
  name: kaleido-migrate-db
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.databaseUrl | quote }}
