version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migration"
    queries: "db/query"
    gen:
      go:
        package: "db"
        out: "db/sqlc"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
